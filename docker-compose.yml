version: "3.8"

services:
  mogutouerp:
    build: .
    image: mogutouerp:latest
    container_name: mogutouerp
    restart: unless-stopped
    ports:
      - "1988:1988"
    environment:
      - MOGUTOU_SQLITE_PATH=/app/data/mgt.db
      - MOGUTOU_NO_BROWSER=1
      # To use MySQL instead, uncomment:
      # - MOGUTOU_DB=mysql
    volumes:
      - mogutou_data:/app/data
      # Mount custom config dir to change DB creds / JWT key:
      # - ./conf:/etc/conf:ro

  # Optional MySQL (run with: docker compose --profile mysql up -d)
  mysql:
    image: mysql:8.0
    container_name: mogutouerp-mysql
    restart: unless-stopped
    profiles: ["mysql"]
    environment:
      - MYSQL_ROOT_PASSWORD=123
      - MYSQL_DATABASE=mgt
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  mogutou_data:
  mysql_data:
